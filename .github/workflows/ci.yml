name: MARSLib FRC CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Apply Code Formatting
      if: matrix.os == 'ubuntu-latest'
      run: ./gradlew spotlessApply
      
    - name: Commit Auto-formatted Code
      if: matrix.os == 'ubuntu-latest'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-format code with spotless"

    - name: Run Reviewdog PMD Annotations
      uses: kemsakurai/action-pmd@v0.0.4
      if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workdir: ./
        reporter: github-pr-review
        fail_on_error: false
      
    - name: Compile (pre-check)
      run: ./gradlew compileJava compileTestJava

    - name: Build with Gradle and Coverage
      run: ./gradlew build jacocoTestReport

    - name: Upload Test Reports (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Test-Reports
        path: build/reports/tests/test/

    - name: Upload Compiled JAR
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Build-${{ matrix.os }}
        path: build/libs/*.jar

    - name: Post PR Coverage Annotations
      uses: madrapps/jacoco-report@v1.6.1
      if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
      with:
        paths: build/reports/jacoco/test/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 80
        min-coverage-changed-files: 80
        title: "Test Coverage Report"

    - name: Generate JaCoCo Badges
      if: matrix.os == 'ubuntu-latest'
      uses: cicirello/jacoco-badge-generator@v2
      with:
        jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
        generate-branches-badge: true
        badges-directory: .github/badges

    - name: Commit JaCoCo Badges
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.os == 'ubuntu-latest'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs: update jacoco coverage badges [skip ci]"
        file_pattern: ".github/badges/*.svg"

    - name: Generate Javadocs
      if: matrix.os == 'ubuntu-latest'
      run: ./gradlew javadoc

    - name: Upload Javadoc Artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Javadocs
        path: build/docs/javadoc/

    - name: Deploy Javadocs to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.os == 'ubuntu-latest'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/docs/javadoc
        destination_dir: docs
        keep_files: false
