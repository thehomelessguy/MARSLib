name: MARSLib FRC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Apply Code Formatting
      run: ./gradlew spotlessApply
      
    - name: Commit Auto-formatted Code
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-format code with spotless"
      
    - name: Build with Gradle and Coverage
      run: ./gradlew build jacocoTestReport

    - name: Upload Test Reports (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Test-Reports
        path: build/reports/tests/test/

    - name: Upload Compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Build
        path: build/libs/*.jar

    - name: Post PR Coverage Annotations
      uses: madrapps/jacoco-report@v1.6.1
      if: github.event_name == 'pull_request'
      with:
        paths: build/reports/jacoco/test/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 80
        min-coverage-changed-files: 80
        title: "Test Coverage Report"

    - name: Generate Javadocs
      run: ./gradlew javadoc

    - name: Upload Javadoc Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MARSLib-Javadocs
        path: build/docs/javadoc/

    - name: Deploy Javadocs to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/docs/javadoc
        destination_dir: docs
        keep_files: false
