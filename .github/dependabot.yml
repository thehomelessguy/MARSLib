version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci:"
  
  # Maintain dependencies for Gradle (WPILib, PathPlanner, AdvantageKit)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build:"
    # Specific options for typical FRC vendor updates
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
